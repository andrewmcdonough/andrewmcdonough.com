<footer class="bg-stone-100 w-full border-t border-stone-200 mt-xl">
  <div class="max-w-7xl mx-auto px-8 md:px-16 py-12 flex flex-col md:flex-row justify-between items-center gap-8">
    <div class="font-serif text-xs uppercase tracking-widest leading-loose text-stone-500 text-center md:text-left">
      © {{ now.Year }} {{ site.Title }}. All rights reserved.
    </div>
    <div class="flex gap-8">
      {{- range site.Menus.main }}
      <a href="{{ .URL | relURL }}"
         class="font-serif text-xs uppercase tracking-widest leading-loose text-stone-400 hover:underline decoration-stone-300 underline-offset-4 transition-opacity duration-500">
        {{ .Name }}
      </a>
      {{- end }}
    </div>
    <div class="flex gap-4">
      <span class="material-symbols-outlined text-stone-400">eco</span>
      <span class="material-symbols-outlined text-stone-400">history_edu</span>
    </div>
  </div>
</footer>
